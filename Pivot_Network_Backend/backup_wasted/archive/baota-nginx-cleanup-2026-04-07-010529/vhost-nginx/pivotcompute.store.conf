server
{
    listen 80;
    listen 443 ssl;
    server_name pivotcompute.store;

    ssl_certificate    /www/server/panel/vhost/cert/pivotcompute.store/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/pivotcompute.store/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497 https://$host$request_uri;

    client_max_body_size 200m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    access_log  /www/wwwlogs/pivotcompute.store.log;
    error_log  /www/wwwlogs/pivotcompute.store.error.log;
}
