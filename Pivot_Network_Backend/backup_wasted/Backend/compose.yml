services:
  postgres:
    image: postgres:16-alpine
    container_name: pivot_backend_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${BACKEND_POSTGRES_USER:-pivot}
      POSTGRES_PASSWORD: ${BACKEND_POSTGRES_PASSWORD:-pivot}
      POSTGRES_DB: ${BACKEND_POSTGRES_DB:-pivot_backend}
    ports:
      - "${BACKEND_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BACKEND_POSTGRES_USER:-pivot} -d ${BACKEND_POSTGRES_DB:-pivot_backend}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: pivot_backend_api
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn backend_app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
